name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          path: fancy-text-site

      - name: Checkout workers
        uses: actions/checkout@v4
        with:
          repository: wanggang265/precision-pdf-pages
          path: precision-pdf-pages
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: fancy-text-site/package-lock.json

      - name: Install dependencies
        working-directory: fancy-text-site
        run: npm ci

      - name: Design handoff diff gate
        working-directory: fancy-text-site
        run: ./deploy.sh --check-only

      - name: Build frontend
        working-directory: fancy-text-site
        run: npm run build

      - name: Copy frontend build to workers
        run: |
          rm -rf precision-pdf-pages/out
          cp -r fancy-text-site/dist precision-pdf-pages/out

      - name: Deploy to Cloudflare
        working-directory: precision-pdf-pages
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
